name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short --cov=src --cov-report=term

    - name: Quick dataset generation test
      run: |
        python scripts/generate_dataset.py --n_samples 20 --rd_size 64 --output /tmp/test.h5
